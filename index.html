<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Inzly</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#000;
      color:white;
      overflow:hidden;
      height:100vh;
      position:relative;
    }

    /* Soft Background */

    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .glow{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(90,100,255,0.12), transparent 70%);
      filter:blur(60px);

      top:-200px;
      left:50%;
      transform:translateX(-50%);

      animation:float 10s ease-in-out infinite;
    }

    .glow2{
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,180,255,0.10), transparent 70%);
      filter:blur(80px);

      bottom:-200px;
      right:-100px;

      animation:float2 12s ease-in-out infinite;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:0.03;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    }

    /* Main */

    .hero{
      position:relative;
      z-index:10;

      width:100%;
      height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:30px;
    }

    .top-tag{
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;

      color:rgba(255,255,255,0.5);

      margin-bottom:30px;

      animation:fadeUp 1s ease forwards;
    }

    .logo{
      font-size:110px;
      font-weight:800;
      letter-spacing:-6px;
      line-height:1;

      background:linear-gradient(
      180deg,
      #ffffff 0%,
      #d9d9d9 40%,
      #6f7cff 100%
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.2s;
    }

    .headline{
      margin-top:35px;

      max-width:760px;

      font-size:24px;
      line-height:1.7;
      font-weight:400;

      color:rgba(255,255,255,0.68);

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.4s;
    }

    .headline span{
      color:white;
      font-weight:600;
    }

    /* Apple style input */

    .access{
      margin-top:50px;

      display:flex;
      align-items:center;
      gap:14px;

      padding:10px;

      width:100%;
      max-width:620px;

      background:rgba(255,255,255,0.04);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:999px;

      backdrop-filter:blur(20px);

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.6s;

      transition:0.3s ease;
    }

    .access:hover{
      background:rgba(255,255,255,0.06);
      border-color:rgba(255,255,255,0.12);
    }

    .access input{
      flex:1;

      background:transparent;
      border:none;
      outline:none;

      padding:18px 24px;

      font-size:16px;
      color:white;

      font-family:'Inter',sans-serif;
    }

    .access input::placeholder{
      color:rgba(255,255,255,0.35);
    }

    .access button{
      border:none;
      outline:none;

      padding:16px 28px;

      border-radius:999px;

      background:white;
      color:black;

      font-weight:600;
      font-size:15px;

      cursor:pointer;

      transition:0.3s ease;
    }

    .access button:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    .sub{
      margin-top:20px;

      font-size:13px;
      color:rgba(255,255,255,0.35);

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.8s;
    }

    .bottom{
      position:absolute;
      bottom:30px;

      font-size:12px;
      color:rgba(255,255,255,0.25);

      letter-spacing:1px;
    }

    /* Floating Lines */

    .line{
      position:absolute;
      width:300px;
      height:1px;

      background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.25),
      transparent
      );

      opacity:0.4;
    }

    .line1{
      top:20%;
      left:-300px;
      animation:moveLine 9s linear infinite;
    }

    .line2{
      bottom:22%;
      right:-300px;
      animation:moveLineReverse 11s linear infinite;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0px);
      }
    }

    @keyframes float{
      0%{
        transform:translateX(-50%) translateY(0px);
      }

      50%{
        transform:translateX(-48%) translateY(25px);
      }

      100%{
        transform:translateX(-50%) translateY(0px);
      }
    }

    @keyframes float2{
      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-20px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    @keyframes moveLine{
      0%{
        transform:translateX(0);
      }

      100%{
        transform:translateX(160vw);
      }
    }

    @keyframes moveLineReverse{
      0%{
        transform:translateX(0);
      }

      100%{
        transform:translateX(-160vw);
      }
    }

    @media(max-width:768px){

      .logo{
        font-size:70px;
        letter-spacing:-3px;
      }

      .headline{
        font-size:18px;
      }

      .access{
        flex-direction:column;
        border-radius:28px;
        padding:16px;
      }

      .access input{
        width:100%;
        text-align:center;
      }

      .access button{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <div class="bg">
    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="noise"></div>

    <div class="line line1"></div>
    <div class="line line2"></div>
  </div>

  <section class="hero">

    <div class="top-tag">
      SOMETHING BIG IS QUIETLY BREWING
    </div>

    <div class="logo">
      Inzly
    </div>

    <div class="headline">
      Building a new layer of digital experience focused on
      <span>speed, intelligence, simplicity,</span>
      and obsession-level detail.
      <br><br>
      Created for people who see the future early.
    </div>

    <form
      class="access"
      action="https://formsubmit.co/weirdmagnetsin@gmail.com"
      method="POST"
    >

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Inzly Early Access Request">

      <input
        type="email"
        name="email"
        placeholder="Enter your email for early access"
        required
      >

      <button type="submit">
        Request Access
      </button>

    </form>

    <div class="sub">
      Selected early members will get priority access.
    </div>

    <div class="bottom">
      © 2026 Inzly
    </div>

  </section>

</body>
</html>
