<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Inzly</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#000;
      color:white;
      overflow:hidden;
      height:100vh;
      position:relative;
    }

    /* Background */

    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .glow{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(90,100,255,0.12), transparent 70%);
      filter:blur(70px);

      top:-250px;
      left:50%;
      transform:translateX(-50%);

      animation:float 10s ease-in-out infinite;
    }

    .glow2{
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,180,255,0.08), transparent 70%);
      filter:blur(80px);

      bottom:-200px;
      right:-120px;

      animation:float2 12s ease-in-out infinite;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:0.02;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    }

    /* Main */

    .hero{
      position:relative;
      z-index:10;

      width:100%;
      height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:30px;
    }

    .tag{
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;

      color:rgba(255,255,255,0.45);

      margin-bottom:28px;

      animation:fadeUp 1s ease forwards;
    }

    .logo{
      font-size:110px;
      font-weight:800;
      letter-spacing:-6px;
      line-height:1;

      background:linear-gradient(
      180deg,
      #ffffff 0%,
      #d9d9d9 45%,
      #7b84ff 100%
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.2s;
    }

    .headline{
      margin-top:32px;

      max-width:760px;

      font-size:23px;
      line-height:1.7;
      font-weight:400;

      color:rgba(255,255,255,0.65);

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.4s;
    }

    .headline span{
      color:white;
      font-weight:600;
    }

    /* FORM */

    .access{
      margin-top:52px;

      width:100%;
      max-width:640px;

      display:flex;
      align-items:center;

      padding:8px;

      border-radius:999px;

      background:rgba(255,255,255,0.04);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      transition:0.3s ease;

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.6s;
    }

    .access:hover{
      border-color:rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.05);
    }

    .access input{

      flex:1;

      height:62px;

      background:transparent !important;

      border:none;
      outline:none;

      padding:0 24px;

      color:white;

      font-size:16px;
      font-family:'Inter',sans-serif;

      appearance:none;
      -webkit-appearance:none;
      box-shadow:none;

    }

    /* FIXES AUTOFILL ISSUE */

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active{

      -webkit-box-shadow:0 0 0 1000px transparent inset !important;
      -webkit-text-fill-color:white !important;

      transition:background-color 9999s ease-in-out 0s;

      caret-color:white;

    }

    .access input::placeholder{
      color:rgba(255,255,255,0.32);
    }

    .access button{

      height:54px;

      padding:0 28px;

      border:none;
      outline:none;

      border-radius:999px;

      background:white;
      color:black;

      font-size:15px;
      font-weight:600;

      cursor:pointer;

      transition:0.3s ease;

      flex-shrink:0;

    }

    .access button:hover{
      transform:scale(1.03);
      opacity:0.92;
    }

    .sub{
      margin-top:18px;

      font-size:13px;
      color:rgba(255,255,255,0.32);

      opacity:0;
      animation:fadeUp 1s ease forwards;
      animation-delay:0.8s;
    }

    .bottom{
      position:absolute;
      bottom:28px;

      font-size:12px;
      color:rgba(255,255,255,0.22);

      letter-spacing:1px;
    }

    /* Floating lines */

    .line{
      position:absolute;
      width:320px;
      height:1px;

      background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.18),
      transparent
      );

      opacity:0.4;
    }

    .line1{
      top:20%;
      left:-320px;
      animation:moveLine 9s linear infinite;
    }

    .line2{
      bottom:20%;
      right:-320px;
      animation:moveLineReverse 12s linear infinite;
    }

    /* Animations */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes float{

      0%{
        transform:translateX(-50%) translateY(0px);
      }

      50%{
        transform:translateX(-48%) translateY(25px);
      }

      100%{
        transform:translateX(-50%) translateY(0px);
      }

    }

    @keyframes float2{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-20px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    @keyframes moveLine{

      0%{
        transform:translateX(0);
      }

      100%{
        transform:translateX(160vw);
      }

    }

    @keyframes moveLineReverse{

      0%{
        transform:translateX(0);
      }

      100%{
        transform:translateX(-160vw);
      }

    }

    /* Mobile */

    @media(max-width:768px){

      body{
        overflow:auto;
      }

      .logo{
        font-size:72px;
        letter-spacing:-3px;
      }

      .headline{
        font-size:18px;
      }

      .access{
        flex-direction:column;
        border-radius:28px;
        padding:14px;
        gap:12px;
      }

      .access input{
        width:100%;
        text-align:center;
      }

      .access button{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <div class="bg">

    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="noise"></div>

    <div class="line line1"></div>
    <div class="line line2"></div>

  </div>

  <section class="hero">

    <div class="tag">
      SOMETHING BIG IS QUIETLY BREWING
    </div>

    <div class="logo">
      Inzly
    </div>

    <div class="headline">

      Building a new layer of digital experience focused on
      <span>speed, intelligence, simplicity,</span>
      and obsession-level detail.

      <br><br>

      Created for people who see the future early.

    </div>

    <!-- FORM -->

    <form class="access" onsubmit="sendMail(event)">

      <input
        type="email"
        id="email"
        placeholder="Enter your email for early access"
        autocomplete="email"
        required
      >

      <button type="submit">
        Request Access
      </button>

    </form>

    <div class="sub">
      Selected early members will get priority access.
    </div>

    <div class="bottom">
      © 2026 Inzly
    </div>

  </section>

  <script>

    function sendMail(e){

      e.preventDefault();

      const email =
      document.getElementById("email").value;

      const subject = encodeURIComponent(
        "Inzly Early Access Request"
      );

      const body = encodeURIComponent(
`Hey Inzly Team,

I would like to request early access.

Email: ${email}`
      );

      window.location.href =
      `mailto:weirdmagnetsin@gmail.com?subject=${subject}&body=${body}`;

    }

  </script>

</body>
</html>
